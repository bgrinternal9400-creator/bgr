
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BGR Backend Status Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #FF2D2D;
      --dark: #0E0E0E;
      --card: #151515;
      --border: #262626;
      --text: #FFFFFF;
      --subtext: #A0A0A0;
      --green: #22c55e;
      --red: #FF2D2D;
    }
    body {
      font-family: 'Barlow', sans-serif;
      background: var(--dark);
      color: var(--text);
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 30px;
    }
    .header h1 {
      margin: 0;
      font-size: 1.5rem;
      letter-spacing: 1px;
      color: var(--primary);
    }
    .status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }
    .card h2 {
      margin: 0 0 16px 0;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--subtext);
    }
    .status-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .status-label { font-weight: 600; }
    .status-value { font-family: monospace; }
    .status-ok { color: var(--green); }
    .status-error { color: var(--red); }
    
    .error-log {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    .error-log th, .error-log td {
      text-align: left;
      padding: 12px;
      border-bottom: 1px solid var(--border);
      font-size: 0.85rem;
    }
    .error-log th { color: var(--subtext); font-weight: 600; }
    
    .refresh-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }
    .refresh-btn:hover { opacity: 0.8; }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>BGR BACKEND STATUS</h1>
      <button class="refresh-btn" onclick="window.location.reload()">Refresh Data</button>
    </div>

    <div class="status-grid">
      <!-- Google Sheets Status -->
      <div class="card">
        <h2>GOOGLE SHEETS</h2>
        <div id="sheets-status">
          <? var status = getSystemStatus(); ?>
          <? for (var sheet in status.sheets) { ?>
            <div class="status-item">
              <span class="status-label"><?= sheet ?></span>
              <span class="status-value <?= status.sheets[sheet] === 'OK' ? 'status-ok' : 'status-error' ?>">
                <?= status.sheets[sheet] ?>
              </span>
            </div>
          <? } ?>
        </div>
      </div>

      <!-- Drive & Script Info -->
      <div class="card">
        <h2>SYSTEM STATUS</h2>
        <div class="status-item">
          <span class="status-label">Google Drive</span>
          <span class="status-value <?= status.drive.startsWith('Connected') ? 'status-ok' : 'status-error' ?>">
            <?= status.drive ?>
          </span>
        </div>
        <div class="status-item">
          <span class="status-label">Last Updated</span>
          <span class="status-value"><?= status.timestamp ?></span>
        </div>
        <div class="status-item">
          <span class="status-label">Runtime</span>
          <span class="status-value status-ok">Stable</span>
        </div>
      </div>
    </div>

    <!-- Recent Errors -->
    <div class="card">
      <h2>RECENT ERROR LOGS (LAST 5)</h2>
      <table class="error-log">
        <thead>
          <tr>
            <th>Time</th>
            <th>Function</th>
            <th>Message</th>
          </tr>
        </thead>
        <tbody>
          <? if (status.recentErrors.length > 1) { ?>
            <? for (var i = 1; i < status.recentErrors.length; i++) { ?>
              <tr>
                <td><?= new Date(status.recentErrors[i][0]).toLocaleString() ?></td>
                <td><?= status.recentErrors[i][1] ?></td>
                <td class="status-error"><?= status.recentErrors[i][2] ?></td>
              </tr>
            <? } ?>
          <? } else { ?>
            <tr>
              <td colspan="3" style="text-align:center; color: var(--subtext);">No errors logged. System healthy.</td>
            </tr>
          <? } ?>
        </tbody>
      </table>
    </div>
  </div>

</body>
</html>
